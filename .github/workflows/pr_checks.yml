name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff coverage

      - name: Run unit tests with coverage (min 50%)
        run: |
          python -m coverage run --rcfile=.coveragerc -m unittest discover -s tests -p "test_*.py" -v
          python -m coverage report -m --rcfile=.coveragerc

      - name: Run Ruff lint checks
        run: python -m ruff check .
